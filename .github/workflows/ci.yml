name: CI

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - config-service
          - eureka-service
          - gateway-service
          - student-service
          - tuition-service
          - test-score-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Grant execute permission to Maven wrapper
        working-directory: ${{ matrix.service }}
        run: chmod +x ./mvnw

      - name: Build and test
        working-directory: ${{ matrix.service }}
        run: ./mvnw -B verify

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 7
          if-no-files-found: ignore

  frontend:
    name: Frontend — React build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          CI: "true"
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build production bundle
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-service/build
          retention-days: 7